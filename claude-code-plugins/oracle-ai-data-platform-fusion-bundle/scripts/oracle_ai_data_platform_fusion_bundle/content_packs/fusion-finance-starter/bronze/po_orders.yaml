id: po_orders
layer: bronze
implementation:
  type: bronze_extract
  datastore: FscmTopModelAM.PrcExtractAM.PoBiccExtractAM.PurchasingDocumentHeaderExtractPVO
  pvo_id: FscmTopModelAM.PrcExtractAM.PoBiccExtractAM.PurchasingDocumentHeaderExtractPVO
  biccSchema: Financial
  schemaOverride: null
  incrementalCapable: true
  auditColumnsMode: bronze_v1
target: po_orders
dependsOn:
  bronze: []
  silver: []
refresh:
  seed:
    strategy: replace
  incremental:
    strategy: merge
    watermark:
      source: po_orders
      column: LastUpdateDate
    naturalKey: [PoHeaderId]
requiredColumns:
  po_orders:
    - PoHeaderId
    - Segment1
    - VendorId
    - LastUpdateDate
outputSchema:
  columns:
    - { name: PoHeaderId, type: "decimal(18,0)", nullable: true, pii: none }
    - { name: Segment1, type: string, nullable: true, pii: none }
    - { name: VendorId, type: "decimal(18,0)", nullable: true, pii: low }
    - { name: CurrencyCode, type: string, nullable: true, pii: none }
    - { name: LastUpdateDate, type: timestamp, nullable: true, pii: none }
    - { name: _extract_ts, type: timestamp, nullable: false, pii: none }
    - { name: _source_pvo, type: string, nullable: false, pii: none }
    - { name: _run_id, type: string, nullable: false, pii: none }
    - { name: _watermark_used, type: timestamp, nullable: true, pii: none }
quality:
  tests: []
