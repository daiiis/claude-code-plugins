id: dim_account
layer: silver
implementation:
  type: sql
  sql: silver/dim_account.sql
target: dim_account

dependsOn:
  bronze:
    - id: gl_coa
      watermark:
        column: _extract_ts

refresh:
  seed:
    strategy: replace
  incremental:
    strategy: merge
    watermark:
      source: gl_coa
      column: _extract_ts
    naturalKey:
      - account_id

requiredColumns:
  gl_coa:
    - CodeCombinationCodeCombinationId
    - $column.coa_balancing_segment
    - $column.coa_cost_center_segment
    - $column.coa_natural_account_segment
    - _extract_ts
    - _source_pvo

# Output schema mirrors the v1 module's default projection
# (dimensions/dim_account.py with DEFAULT_SEMANTIC_SEGMENT_MAP — six
# segments). v1 emits up to MAX_FUSION_SEGMENTS=30 positional columns
# but starter-pack coverage declares the six-segment subset to keep the YAML
# and common live data aligned. Tenants with deeper COAs extend via a pack
# overlay.
outputSchema:
  columns:
    - name: account_key
      type: bigint
      nullable: false
      pii: none
    - name: account_id
      type: bigint
      nullable: false
      pii: none
    - name: chart_of_accounts_id
      type: bigint
      nullable: true
      pii: none
    - name: code_combination
      type: string
      nullable: true
      pii: none
    - name: segment_01
      type: string
      nullable: true
      pii: none
    - name: segment_02
      type: string
      nullable: true
      pii: none
    - name: segment_03
      type: string
      nullable: true
      pii: none
    - name: segment_04
      type: string
      nullable: true
      pii: none
    - name: segment_05
      type: string
      nullable: true
      pii: none
    - name: segment_06
      type: string
      nullable: true
      pii: none
    - name: company
      type: string
      nullable: true
      pii: none
    - name: cost_center
      type: string
      nullable: true
      pii: none
    - name: account
      type: string
      nullable: true
      pii: none
    - name: subaccount
      type: string
      nullable: true
      pii: none
    - name: product
      type: string
      nullable: true
      pii: none
    - name: intercompany
      type: string
      nullable: true
      pii: none
    - name: account_type
      type: string
      nullable: true
      pii: none
    - name: enabled_flag
      type: string
      nullable: true
      pii: none
    - name: summary_flag
      type: string
      nullable: true
      pii: none
    - name: detail_posting_allowed_flag
      type: string
      nullable: true
      pii: none
    - name: financial_category
      type: string
      nullable: true
      pii: none
    - name: start_date_active
      type: date
      nullable: true
      pii: none
    - name: end_date_active
      type: date
      nullable: true
      pii: none
    - name: bronze_extract_ts
      type: timestamp
      nullable: false
      pii: none
    - name: bronze_source_pvo
      type: string
      nullable: false
      pii: none
    - name: silver_built_at
      type: timestamp
      nullable: false
      pii: none
    - name: silver_run_id
      type: string
      nullable: true
      pii: none

quality:
  tests:
    - type: not_null
      columns: [account_id]
    - type: unique
      columns: [account_id]
