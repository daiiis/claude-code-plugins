id: fusion-finance-starter
version: 0.1.0
description: |
  Starter medallion model for Fusion Finance analytics.
  Ships silver dimensions (dim_supplier, dim_account, dim_calendar) and
  gold marts (gl_balance, supplier_spend, ap_aging). Variation points
  and profile defaults are authored from the Fusion Finance starter
  registry snapshot (see tests/fixtures/v1_registry_snapshot.yaml).

compatibility:
  pluginMinVersion: 0.3.0
  fusionFamilies:
    - ERP
  aidp:
    requiresDelta: true

defaults:
  sqlDialect: spark-sql
  identifierPolicy: validated-three-part
  runIdColumn:
    bronze: _run_id
    silver: silver_run_id
    gold: gold_run_id

profiles:
  finance-default:
    calendar:
      startDate: '2020-01-01'
      endDate: '2030-12-31'
      fiscalStartMonth: 1
    # Documentation of conventional Fusion COA role-to-position
    # mapping. NOT consumed by any v0.3 SQL template — the three
    # `coa_*_segment` columnAliases below own the bootstrap-resolved
    # source-column substitution for the three roles. See
    # `LIMITS.md P3-L2` entry for the role-positioning architectural
    # limit and the future `{{ coa.<role> }}` token.
    chartOfAccounts:
      balancingSegment: segment1
      costCenterSegment: segment2
      naturalAccountSegment: segment3

# Variation points. Bootstrap walks each entry's candidates in priority order
# and pins the first that exists on the tenant.
columnAliases:
  supplier_natural_key:
    appliesTo: bronze.erp_suppliers
    required: true
    candidates:
      - SEGMENT1
  vendor_id:
    appliesTo: bronze.erp_suppliers
    required: true
    candidates:
      - VENDORID
  invoice_currency_code:
    appliesTo: bronze.ap_invoices
    required: true
    candidates:
      - ApInvoicesInvoiceCurrencyCode
      - ApInvoicesCurrencyCode

  # COA role aliases. Each role has a SINGLE-CANDIDATE list pinning
  # its conventional source column. Bootstrap auto-resolves trivially
  # on conventional Fusion COA.
  #
  # Honest limit: columnAliases resolve by physical column existence.
  # CodeCombinationSegment1..6
  # all coexist on every Fusion gl_coa extract, so a non-conventional
  # tenant (e.g., balancing role at Segment4) would have bootstrap
  # auto-resolve to Segment1 anyway — Segment1 still exists, just
  # not as the balancing column. The recovery path for non-conventional
  # COA is pre-authored overlay (extending the candidate list with
  # the role's actual source column) OR hand-edited profile, BEFORE
  # running bootstrap. A future `{{ coa.<role> }}` renderer token
  # consuming `profile.chartOfAccounts.<role>Segment` integers is
  # the proper architectural fix (out of v0.3 scope). Use a skill-authored
  # overlay for tenant-specific escalation.
  coa_balancing_segment:
    appliesTo: bronze.gl_coa
    required: true
    candidates:
      - CodeCombinationSegment1
  coa_cost_center_segment:
    appliesTo: bronze.gl_coa
    required: true
    candidates:
      - CodeCombinationSegment2
  coa_natural_account_segment:
    appliesTo: bronze.gl_coa
    required: true
    candidates:
      - CodeCombinationSegment3


# Semantic variants. The fragment is substituted into `{{ semantic.<name> }}`
# at render time after bootstrap resolves which candidate's
# `detect.columnExists` matches the tenant.
semanticVariants:
  cancelled_status:
    appliesTo: bronze.ap_invoices
    required: true
    candidates:
      - id: cancelled_date
        detect:
          columnExists: ApInvoicesCancelledDate
        fragment: "{table}.ApInvoicesCancelledDate IS NULL"
      - id: cancelled_flag
        detect:
          columnExists: ApInvoicesCancelledFlag
        fragment: "COALESCE({table}.ApInvoicesCancelledFlag, 'N') != 'Y'"
