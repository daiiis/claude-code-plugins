id: scm_items
layer: bronze
implementation:
  type: bronze_extract
  datastore: FscmTopModelAM.ScmExtractAM.EgpBiccExtractAM.ItemExtractPVO
  pvo_id: FscmTopModelAM.ScmExtractAM.EgpBiccExtractAM.ItemExtractPVO
  # See po_receipts comment — tenant-dependent BICC offering schema.
  biccSchema: Financial
  schemaOverride: null
  incrementalCapable: true
  auditColumnsMode: bronze_v1
target: scm_items
dependsOn:
  bronze: []
  silver: []
refresh:
  seed:
    strategy: replace
  incremental:
    strategy: merge
    watermark:
      source: scm_items
      column: ItemBasePEOLastUpdateDate
    naturalKey:
      - ItemBasePEOInventoryItemId
      - ItemBasePEOOrganizationId
requiredColumns:
  scm_items:
    - ItemBasePEOInventoryItemId
    - ItemBasePEOOrganizationId
    - ItemBasePEOLastUpdateDate
outputSchema:
  columns:
    - { name: ItemBasePEOInventoryItemId, type: "decimal(18,0)", nullable: true, pii: none }
    - { name: ItemBasePEOOrganizationId, type: "decimal(18,0)", nullable: true, pii: none }
    - { name: ItemBasePEOItemType, type: string, nullable: true, pii: none }
    - { name: ItemBasePEOLastUpdateDate, type: timestamp, nullable: true, pii: none }
    - { name: _extract_ts, type: timestamp, nullable: false, pii: none }
    - { name: _source_pvo, type: string, nullable: false, pii: none }
    - { name: _run_id, type: string, nullable: false, pii: none }
    - { name: _watermark_used, type: timestamp, nullable: true, pii: none }
quality:
  tests: []
