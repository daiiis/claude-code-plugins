apiVersion: aidp-fusion-bundle/v1
version: "0.2.0"
project: fusion-finance-starter-demo
variables:
  team: starter

# v2 content-pack wiring (Phase 3) — declares which pack + active tenant
# profile the orchestrator should resolve under `--execution-backend
# content-pack`. The companion profile YAML lives at
# `<bundle.yaml.parent>/profiles/finance-default.yaml`.
contentPack:
  name: fusion-finance-starter
  profile: finance-default

fusion:
  serviceUrl: ${FUSION_BICC_BASE_URL}
  username: ${FUSION_BICC_USER}
  password: ${vault:ocid1.vaultsecret.oc1.iad.placeholder.fusion_password}
  externalStorage: ${FUSION_BICC_EXTERNAL_STORAGE}

aidp:
  catalog: fusion_catalog
  bronzeSchema: bronze
  silverSchema: silver
  goldSchema: gold
  storageFormat: delta

# Bronze datasets the starter pack declares (see content_packs/
# fusion-finance-starter/bronze.yaml — keep IDs in sync).
datasets:
  - id: erp_suppliers
    mode: full
  - id: ap_invoices
    mode: incremental
    schedule: "0 2 * * *"
  - id: gl_coa
    mode: full
  - id: gl_period_balances
    mode: full
    schedule: "0 3 1 * *"

notifications:
  onFailure:
    - ahmed.shahzad.awan@oracle.com
